front:
  text: 銅符鐵券重刋道藏輯要
  hash: sha256:ea8cb9b814181fbe992ca0ab8c12ee6f45ee665187f5ac5cff20e7d1e0390a61
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-KZ_KR5i0040_02p001a}
body:
  text: 銅符鐵劵玉淸無極總眞九天諶母元君授許眞君銅符鐵劵總訣三元神丹口訣玉淸有命封仙職掌握南曹主化一赤文幽隱鬱儀房玄科至禁藍天碧八萬四千一刼傅傳出天符火記厯庚甲之年雜氣消諸天慶會禹餘室稽首恭默大道前萬聖千眞總湛寂瓊臺遐想玉淸容顰眉不展憂心匿良久開揚九六門鸞鶴斜聞龜仰覔大道流行滿上天爾曹仙子樂無邊龍漢延康三刼盡玄宫大展令敷宣東華昇舉西華主太乙元君諶母傳親授皇人二八機至玄至妙至幽微可令塵寰流玉液早將仙子赴瑶池珠臺降下銅符劵勅下元君諶母知弘道眞人弘道仙闡揚正教汞和鉛鉛飛雪浪流珠滚覆下依然眞土眠土禀天符生碧葉躱躱金花起紫煙紫煙飛上凌霄殿連連續續氷花片日月抛光朗大千巽風吹起金花現不得流珠不計鉛生靈聚景防危戰日魂將近月神圓赫赫日魂霞九萬四方籠罩合眞鉛鉛含五彩何人見煉鉛無計覔眞傳不得庚金華不現採得辛金一味眞再入灰池取次鍊上下浮沈顚倒間壬花莫令烏雲亂抽出天魂奪日霞水晶宮裏是吾家返得流金囘聖體何勞蹉跛遍天涯汞死爲鉛鉛化土白金鼎器丹之祖懷盡天魂地魄中玄元稱此爲丹母汞積九九返成砂龍出東方西就虎晉世明王孝道存金筋玉骨許之孫咒符勅水降魔魅明功暗德濟蒼生可將鐵劵天王旨銅符細細口傅君玉淸願見功勛士光眉大展笑顔欣巨闕彌封碧玉匣明珠照世破幽城速令名山拿玉兔燦日擒歸再莫論日魂消盡千山雪奚慮區區遍體陰但烹黍米扶神氣看看天時徧五陵惡龍噴出三江水毒氣零零滿世塵若不勅汝扶危難骨城血海痛傷心急以鼎池爐裏煉巧奪乾坤日月精道法千門及萬戸千門萬戸獨斯尊十二神符九白雪三囘五轉號天靑一粒一服三期後周身九竅自光明白雪入口身生羽神符吞下足生雲漸覺三陽開㤗日浮生腐草盡逢春功高行備膺天祿拔宅昇騰及滿門早朝上帝抛金璽玉詔天書五岳迎閑觀碧落空歌韻時倚空靑始氣森一自五雲騰勝日天香滿室古今聞九六天機親囑付珍藏寶秘莫爲輕至人授受吳王李非之雷火卽時臨金丹遞運玄元始五炁分張一炁成不比嚥呼三一法不是囘頭口内津不是閨丹御女術不是砒黃丹礦成鉛是元神銀是形形神相得合爲眞元神相遇眞形後果用元神觀太淸寶塔訣古法九層虛極藥所不至今減而用之或七層五層每層高六寸下安蓬壺雌雄子口層層俱有竅妙以便龍虎氣昇安合固濟坐於池上外用鐵環高掛於天梁上令其安穩方架内火火儘蓬壺腰下以鐵架架起以圍火力庶使火難侵於寶塔朱雀易得安身進鉛門止用半寸高蓬壺腳下三方安三足厚方如指節令火勢有力上古傅受用風箱鞴火後人遂開風門風舌用之尤妙不勞人力火勢盛則閉不及卽開作用處在人活法不必一一拘舊陰陽謂之道變通謂之法風炭門一開一閉不使疾風吹驚池鼎恒令人廵視恐有不虞之患莫作尋常爲之雖曰百日之功勞乃是昇天之基址燒取眞鉛訣一初取出山鉛砂數百斤搗爲末就用礦上圳音酬土每一斤配食鹽四兩搗萬杵秤定鉛砂末一斤以紙包褁數層外用鹽泥固之五六分厚晒令極乾如此固三五百枚入爐煆之爐式形如大甑高六七尺周圍一丈下安風箱底火上昇用炭鋪底一尺厚方鋪鉛砂球在炭上層炭層球大火煆得内外通紅止火寒爐陰土覆上鉛在下成一塊破球取出如生礦銀狀如此謂之乾父將此乾父取流金則藥有精神非是鉛圳土否則神㪚杳茫不得師授苟或妄爲終爲誤事神丹至藥只是一味鉛精若得此寶萬事畢矣此爲先天眞一之水多倍其數以聽聖灰築基之用採得壬水一分眞不換黃金重一斤至此神機又聽後繼大法古羲黃修煉神丹大法地元起手金鼎神室上下兩弦體重一斤如九鼎七鼎五鼎三鼎必依大法度數採煉假如白金八兩用伏氣黑鉛三十六斤只有八九七十二兩按九池而取之恐鉛炁不足神精降少難合天地符契半斤八兩之數今用九兩煉一兩不多不少正宜應用須宜多採流珠以防鑄室泄氣之用先求地魄地魄者白金也次取天魂天魂者黃金也黃金産硃砂是日精白金生流珠是月華魂魄合體精華自生奪天地日月之全功是聖祖玄元之妙用聖人知神物隱於北方採此以作丹頭不用世上黃金黃金雖是純陽之體縱加百煉决不受氣至於銅錫性質太燥難見金公見則形必傷也獨與白金一味相親暢體欣然金花發泄流滚珍珠豁然於其間眞陰眞陽交光合體巧取周天度數滿於五色中黃自然陽生於眞土也土旺金鄉借水虎育養而生震龍五色霞鱗金膏碧體朗朗常存爲昇天藥祖愈煉愈靈越温越妙故有陰池陽鼎因鉛不受煉設爲法象以定浮沈之性造鼎爲陽使陽魂自昇於天堂之上制池爲陰使陰魄自沈於地獄之中一九功在鉛二九功在母諸方不用母丹門甘自苦壬癸怎分張老脆化陰土用鉛有秘傳始初金煉鉛浮沈定得眞先天與後天認得其中趣無拘洞裏仙嬰兒尋乳母轉轉出玄關藥卽是眞汞金母是神丹一母生九子各自傳枝葉一分藥力能脫半斤赤鳳紅顔濟世安民非凡可覩德薄不足以遇縁淺不足以聞此是杳冥眞秘訣子宜記取在胸襟安爐立鼎訣上供九天五土司命北斗七元眞君丹房護屬正神金木水火土五德星君侍供香火燈燭菓品䖍告上眞預造鉗匙等器餘積黑虎鐵池寶塔多備以防損換爐内合風開門如雞子大勿令太寛寛則風力緩緩則眞氣不昇池下三方安三足不用鐵造以磁土燒就安如品字外以鹽泥固之堅牢不損安池在上方架重樓兩邊以鐵環高掛於天梁之上内火葢固不令火力近鼎別開出入火路以便加減行持地元九池秘訣銅符鐵劵第一池函文兩兩鬱羅臺八寶昭陽殿萬聖拱中尊元始天王現玉女嘯丹墀方使金公煉一唱眾眞揚世界金光徧謹候北豐魔洗出朝陽苑用力在丹人棄舊迎新換乾金奪日霞莫致烏雲亂產出夜明珠五色輝煌片上下令通風金棗嬰兒面希夷陰濁捐放開河車轉紫氣上重樓子母不相見初產覔金花勿使精神㪚直指函文名曰靑埃第一池煉鉛法則用出山淨金一斤白如雪朶碎作十六片乃於日月合璧日五星聯珠日申酉金旺日將池鼎安置停當開風門進文武火文火温池先投鉛半斤煉灰池結實基址堅固免致折耗之患待池將紅叧用伏炁淨鉛九觔每觔分三百六十五銖每銖四分二釐五毫共三千三百八十五銖爲一池九池共鉛八十一觔以應九九周天之數將金片片入池武火溶化成汁只待黑盡白現一上一下浮沈兩旋紅光閃閃半虛空瑞氣炎炎浮紫廓取次入鉛漏盡再添滿天星宿浮沈轉寶月金花劈面來鉛珠又進莫離方寸看看癸水盡方見海金鼇急進鉛爻壬水上潮和風吹得金花㪚㪚卻盈庚見酉孩須用有力三人互相輪換飮食起居八門開閉進鉛入炭猛烹急煉使朱雀炎空紫神瑞氣金棗花紅火火生光爻爻露電進鉛不可太急急則金烏不出海又不可太緩緩則玉兔恐傷形水火交纒數足無形合虛曠然成質壬水得金自然昇上泥丸之頂結就昱日流珠鉛數投盡退火封門安金益水進鉛三錢四分保神固形不可有動池鼎冷定取出摘下鼎中壬水號曰靑埃或金盒磁盒封固勿令泄氣聽後人元配合銅符鐵劵第二池函文同志二三人固守紫陽宮黑以白爲母紅以黑爲翁中和天地髓只此是丹宗禹門三汲浪漏滴令空空殿上流珠滚色是紫金紅池中翻玉液吹噓藉巽風玉兔西爲宅金烏直上東龍虎遥相望會合景陽宮抽出鉛中寶火候莫匆匆煆得金珠滚珠珠氣上冲眼見紅黃色華葢要嚴封滴盡池中濁浮淸秀蘂蓬直指函文名曰黃輕第二池煉鉛火候法則與首池相同仍換新池新鼎固濟如法將聖母不動如有消耗卽添補數足進文武火投水鉛半觔堅固基址鉛乾一半入聖母在内大火鎔化金汁淸淸明徹底朱雀恍恍出南園速進鉛銖勿容太急昨夜嬰兒初別母今朝次子亦如前再進鉛銖銖銖如則莫道黑龜初出海也防風浪動人心鉛鉛無差火火一色紫金臺上凝霜雪白玉堂前母獨眠策策丙丁昇滴滴鉛入骨鉛數投盡明鏡無塵退火封門進安金之鉛二錢三分寒爐一夜輕輕取敲取鼎上流珠號曰黃輕取下另封移池換鼎銅符鐵劵第三池函文大道總無繁鉛汞兩般是鉛見汞施恩汞見鉛施義神丹一味鉛内隱先天炁媒妁丙丁翁調攝黃婆力搬運類牛車鉛把汞精吸浮沈上下間一一又一一華堂日日新流珠號如意白鶴滿天飛火要雷霹𩆝乾金露素華休使鉛不及恆令四門開止把雙關閉一動鉛氣通金池當固密這般火烹煆無形又無質直指函文名曰金液第三池煉鉛火候法則一一與前相同將固池架三足上坐鼎封嚴不動聖體無虧消耗補全入築基池中大火風開三文三武黃芽長再昇再降黑鉛功火火大張爻爻無易黑鉛起手無生有白金倒了有還無依刻投鉛愈加珍重靑龍退骨三迴轉白虎翻身就地存進進鉛爻首尾如是西池日月初相見奪得淸香各自歸龍霞紅似火眞火勝龍霞鉛數進畢退火停爐入安金之鉛一錢二分前三池是長男成象震庚受符共用安金之鉛七錢以應天符七日來復之說以後六池則不用此法矣退火寒爐取出鼎上壬水號曰金液封記明白又換新池作用銅符鐵劵第四池函文東出太陽精光華燦燦明徧照普天下霞入碧波城晝夜東西轉西沈東復昇闔闢太陽母萬象禀光明乾坤天地髓坤丹大道根坤乙月將晦昏昏體太陰漸到西南地微微露一星日遊東北陸月漸望南行七八光流體看看重半斤半黑又半白白者是金精若非三足力玉兔華不生十五臨甲地丹光滿玉京直指函文名曰紅霞第四池煉鉛火候與前俱同不動聖胎待母入池大火風開仍前進鉛不得苟簡三開三合產眞鉛不是陰陽定不出又進鉛爻爻爻相續金丹全仗庚辛力壬不成庚癸不分但看鉛壬相濟白金金水得合凡子聖孫華池母鎔各要分明紅光五色裂火霞生時時美景如金碧日日花開樣不同下手只銀鉛分散鉛汞土銖盡爻空寒爐一夜取出鼎上壬水號曰紅霞收記換池另煉銅符鐵劵第五池函文黑鉛天之精白金地之液黑隱水中揚白有火之氣黑白往來翻拘來歸正位二物性合情丹經居同類黑以白爲夫陰以陽爲配陰陽混沌時朶朶金花翠寶月滿丹田猛烹火煆極休閉通天竅令其呼與吸翻騰舉目間烏龜自隱匿精奇口訣功火候在消息壺中養聖孫萬般只此貴一日生一男男男各居室直指函文名曰流金第五池煉鉛火候採煉池鼎一一相同聖母入池風開金汁照前投鉛常加炭入金公百煉精神長惟有眞鉛上下飛又進鉛銖黃白混沌烹煎符火三陽運九九流珠去母陰認取鉛金不黃不紫日魂乍進嫦娥宅覓得中秋桂蘂香鉛盡壬昇辛金自現寒池取出號曰流金收貯換池另煉銅符鐵劵第六池函文採鉛一味眞胎靈母亦靈一母生六子扶桑日已臨池池俱似始鼎鼎更奇新上達紅爐景珠珠要氣騰莫使鉛埋汞休言有氣存烜烜巽風烈流金透體明不爲堅剛質黃輿自此生癸以壬爲主壬以癸爲賓卻依大道法壬癸定浮沈棄捐濁中濁輕淸靈更靈如此浮沈法葢世不曾聞火候薰蒸足顆顆天谷靑直指函文名曰壬華第六池火候煉鉛斤兩法度一一大同分鉛度數不拘舊巧變化在人施爲煉過二三池自生其妙如流珠結少神火不揚煉已稍欠神明不來再行結胎之火務使黃雲滿沼陰極陽生上下門開紅光閃灼露滴黃庭嬰兒顯象光逐神生鉛如指頂令其四方以便作用嘗令飲食滿腹方可近爐邪氣難