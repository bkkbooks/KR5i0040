老嫩鋪葢聖金火候温養分胎法則如前一樣日足開取退下四鼎囂塵三錢伏雌黃一兩聞氣而死將雌一錢化鉛一兩成銀將銀鎔化再點靈雌七分成上色黃金以此金造神室伏養八石各有變化六鼎人元六鼎丹關過又重關灑落明堂所珠珠子奉還靑汞八百𡻕也要半斤鉛來往平平入金鳥湧大淵陰符不可急陽火正炎炎武短文長法光華滿大千六陽來復後噴鼻味香甜親授銅符劵不怕不爲仙訣曰前聖金一斤移入新鼎以五鼎流金六池壬華共三斤混合一處養之火候温養分胎一一俱同武火時候切要謹愼恐防走失神氣則前功俱廢鼎器堅牢封固嚴密則陽光自入黃金舍中眞父眞母合體傳神須用天符火候補復還元金生水液轉轉配合日足取下抽出天魂伏膽磠如猫捕鼠化鐵錫如風掃雲爲聖金聖銀之體萬古無更見火則紅光直上暗處似曉日光明不與世寶相同七鼎人元七鼎丹金鳥入廣寒太極團團轉封固密更嚴乾生巽艮坤坤生震兌乾神火平平入調燮要周全芙蓉方結菓粒粒在金盤照破人天鏡月食太陽肝七陽來復後玄玄玄又玄親授銅符劵天上又生天訣曰前聖金一斤以六鼎壬華配七池壬花混合一處入鼎封固温養火候同前退下六子以伏砒霜聞氣而死至此八石歸眞各有變化鉛英伏汞英金銀目下成秘之愼之八鼎人元八鼎丹飄飄月正鮮老蚌含珠養明鏡水晶盤雲收天霽外嬰兒顯大千翡翠平平入四七運推遷無質是眞汞有質是眞鉛二物一斤重日午正當天八陽來復後紅菓綠枝顚這般眞下手跳出海天寛訣曰前聖金一斤已成庚體以七鼎壬花配八池紫金硫混合一處火候固濟分胎同前日足取下七子養砂乾汞靈妙無邊點化七十二石脫凡成聖此神火之精英五金八石之頑體獨此補全九鼎人元九鼎丹巍巍象帝先十月胎完足九九復還乾造作長生匱砂汞骨毛寒砂變凡爲聖汞返聖爲神一子經一月過關換鼎閑轉轉鉛中煉功成不用鉛早將陰行積隱跡在人間鐵劵銅符旨秘密勿多言訣曰前聖金一斤將八鼎紫金硫九池靈妙砂共三斤混合一處温養火候法則與前俱同不必一一拘說胎囂作匱靈妙難言澆淋灌注金笋黃芽皆從此出分枝接養三變而化金麥失瓦礫自然成寶聖胎九陽數足丹母全眞陰盡陽純脫胎神化開看内外純黃表裏透徹光如水晶似太陽初出金星燦燦神水汪汪耀晃人目五彩霞生異香噴鼻紅琉璃絳琥珀乃七返九還煉氣化神黑金煉白金白金成黃金黃金爲至藥眞出世之丹砂作昇天之藥祖如要服食懸入井中七日退去火毒烹成金粟吿明上帝高眞擇日沐浴晨昏向東以淸水服之一日一粒百日改形換骨自然神氣相適魂魄凝和三期之後周身九竅盡皆光明修丹至此萬事畢矣一轉至九轉九九八十一磁盒封固外用壬水流珠上下鋪葢陰爐温養自有三色四樣之靈藥池池殊異鼎鼎鮮明再尋至友選擇名山建立壇宇鼓鑄神室上下二釡明堂正德俱於神丹秘範載之東晉武帝大道正行諶母出焉眞君授於吳猛吳猛傳於謝廷盛今玉輦龍車金冠星服永爲金闕之臣神方在世付賢授德不可輕泄慢漏咄神仙費盡千辛苦到頭只是煉鉛金天元秘訣九天機要夫神丹大藥必須於金土窗塵過隙皆禀於離符九九乾爻六六坤策八兩水而八兩金金水何虧半半淸兮半半濁雲霧自契金一滴以淸明火一符而瑩徹口訣精專下手的確伏一虎之權衡降九龍之標格于以體乾坤之象于以顯日月之光希夷闔闢萬象自臨准則抽添毫釐依法預制法器于壇中先辦盆盂於左右眞友職事忠直温良未造神室歸金鼎且訪良朋輔聖基龍虎拱朝龜蛇伏翼依按玄科萬無一失且守至誠始終無異何勞天上金烏降且捉人間玉兔歸煉出浮黎眞土產出如意寶珠吞食一粒霞彩沖霄未得之前陰德廣臨爐之際不勞心我將三段工夫指片言無隱付隆君夙植道根不求自臨莫把天機容易語非人空閃喪其形水火直義大丹用五會之眞火不用凡火眞火賴日生黃帝將陽燧取火陽燧難求赤金亦可向日而取大抵太陽乃天之眞火其精自有其光自現日日皆然月月如是若以木石鑿撥而取其性燥烈非自然之意不若當正午火旺之時以火鏡向日取之借日生火亦是眞火故云日魂以象眞汞又爲眞種以足神丹之用何必拘拘於陽燧也取水必賴方珠方珠乃月華昇上就水結形性是純陰八月十五夜亥子二時當月華旺盛而取之除中秋之望餘月再不可取倘德行未周陰功未備未盡格天之誠必多陰雨之晦水何由得縱得眞水一宵之取能有幾何養虛無神藥眞火在下水有消折每一晝夜抽添用水十斤之數一年用二千五百餘斤之水中秋一𡻕不過亥子二時焉能注二千五百餘斤之水不得此水不合正配日魂月魄之意天水天火之宜若用凡水又非眞種學人絕路豈不誤哉今開方便之門大顯沖霄之徑葢水者乃月華之陰精天一之神水流液俱出於神龍每年純陽之四月乃神龍變化之時其水有靈大雨時行多用磁器盛接以物葢合勿令塵投以便一年之用未有一月而全無雨者此亦至人變通之妙何必拘拘於方珠也地脉直義修鍊金丹當擇名山福地岡阜高巍前包後擁坐子向午使金烏玉兔東昇西没左右輪轉水澤盡美竹木淸奇龍輔叠叠于宮傍虎翼層層于神室玄武隱隱如屏朱雀行行列面避塵俗之往來斷常交之義友修成璚島之鄕勿邇尸墳之穢上觀天文下察地理日有奇禽而鳴時增異獸而遶藏經隱史露寶生芝方可建立丹宮自然仙聖降臨地神擁佑終始無虞多生慶幸宮室直義鼎隨藥置室依鼎修一間一鼎三鼎三房高一丈六尺闊一丈四尺四隅令空重廊遶行非齊雲摘星之比非雕梁畫棟之華四面置牖或閉或開鑿頂通氣納瑞招祥地平如掌無坡無凹縫咸塗塞勿容邪穢鼎室多寡度量施爲每一鼎之功夫俱合天地日月三才四時五行六氣七政八卦九宮十干十二支二十四炁七十二候二十八宿萬象生成正南開門庖溷浴室稍遠別造確守威嚴如臨君聖壇臺直義旺方取上等黃土蒸煉築臺仍用塑工務令堅固候至自乾勿容急迫壇分三層應天地人三才下層高一尺二寸分八角周圍二丈八尺橫徑九尺三寸開八門門各高八寸闊三寸各造土門以備啟閉仍各開路透臺中心虛徑五寸以通風火中層高一尺二寸周圍二丈四尺橫徑八尺六寸亦分八角畫八卦符水一火二木三金四土五上層高一尺二寸中虛五寸其度則圓應天圓之意周圍一丈六尺橫徑五尺三寸圖二十八宿之象以及春夏秋冬七十二候臺上置太乙神爐身高一尺六寸四圍及底皆厚六寸内明堂橫徑七寸足高四寸身與足通高二尺自底足及葢中虛五寸與臺心等造土隔於爐中中間以盛火碁厚三寸徑六寸其爐半露半藏臺上畫靑龍白虎朱雀玄武四象于上布十二月將之辰屋簷之東西則畫日月象金烏玉兔之明其神爐須擇黃道天德月德上吉等日于旺方取純黃正色之土淘取極細蒸曝潤浸用紙筋杵熟塑之再加白蟮土細沙及代赭磁石取四七合宿吉時起手造成陰乾然后加火煆煉封於臺上鼎器直義鼎身長一尺二寸通厚一寸一分唇一分分三級其唇至底亦三級内明堂橫徑一寸六分口唇橫徑七寸下有鼇足三分一法用泥土恐不堅以九九煉淨熟鐵淸汁鑄造恐有漏眼金汁不淸者不用擇五星連珠日日月合璧日鑄之多備以聽更換勿容苟簡鑄畢奏吿師眞置於爐内一年一鼎不可重用上坎鼎入於下離鼎之内畜水高八寸四分圓一尺五寸徑五寸唇一寸二分其腹至臍一寸二分用赤金造之坎離二鼎互相瞰入其撥蠟之法皆要細膩所爲瞰的平穩無纎毫縫圻方用極熟細坭仍加塑工嚴密制造不可苟爲候乾烘去蠟汁盡方以金汁鑄之垣郭直義垣郭以安鼎用土日取五方細土以水飛過以楮汁和成塊𢷬煉堅熟形如鍋釜其高九寸厚九分離鼎寬一寸九分口略厰而圓土日取土火日造之下塑八柱令其堅固一名丹竈以坎離之炁歸重屋之内神室直義修煉大藥全借神室奇器分毫有差施化難矣先造蠟式熟坭塑上俟乾以辨正鼎之餘方可凖厚薄寬窄大小圓長依大道用玄水如法久煉傍留一穴固濟停當用火𦑜成淸汁以鐵杖通透瀉於模式之中兩釜各鑄務令相合上乾下坤而爲中黃爕理陰陽中虛寸餘以生靈汞生則爲玄牝合則爲太極鑄室取金旺之月日三日出庚制煉正模止用前九池九鼎煉就金母鑄之淨金一斤鑄成止有十五兩旣鑄之後眞氣因火漏泄若便入爐恐金精結少玉液生遲不能變化徒費前工必須用前取壬水内外塡滿多培其氣入磁鼎固之平火温養百日一月一換爲三接氣使精神完全魂魄堅固百日後方用六一泥石膏枯礬煆過代赭黃丹赤石脂並重羅灰粉封固口縫銀絲十字扎住外用聖金聖銀製造包胎重重裹定勿令有差雌雄子口相合爲一形如雞子外圓内方能受天地之精靈水火之養育模取圓轉土日造之形高四寸皆用周尺符鏡直義八方懸鏡各徑尺二靠屋面鼎四隅掛劍其鏡劍鑄造及出没己亥正三刻預入各職威守寂靜嘗如對待神明用潔淨黃袱包裹安於聖眞位前晨昏奏祝至土臨官帝旺日一陽初生安於丹室金鼎左右峙立五岳先煉五色土塑五岳形神俟乾至鼎底平正如岳封固鼎縫逐日祭吿至運行水火各盡乃職陳設直義創建丹房造壇築垣立鼎安爐咸擇土旺日時懸三元寶照以袪妖邪插劍四隅以鎭鬼神寶照卽鏡也天照用甲子乃六六首陽之日取黃道神在金石合成日方鑄明堂時大妙地照用壬子日太陽望中時鑄仝照用丙子日太陽正中時鑄各徑過二尺四寸劍用霜降日造古劍尤妙符簡四片太乙降宮時鑄金石合日亦可四方符篆五彩旗令並有規律旗准五方之色各長二尺繫於鏡照之下及重屋之頂其十二元辰符鐵簡符四壁符三臺符八卦符老君鎭壇符二十八宿符及金烏玉兔圖四象圖以上符篆諸經史書中各有載之者每宮之内供奉丹主周天妙化眞人九陽威德濟生度死眞人日宮太陽火德星君月宮太陰水德星君太乙主宰高上帝師元君十二元辰本命星君正一龍虎玄壇趙天君飛㨗報應諸天使者傳經演教厯代仙師丹房通事土地正神依法面鼎每日十二時香盤輪換燈燭勿絕火盤靠東北隅用銅造等稱以定火數須用熟炭庶無驚爆之患水盤靠西南隅造八株杓添水抽水盂盛已用之水添水盂蓄未用之水每宮之内用二友司水火銅壺報刻乃抽乃添須凖八門法遁三奇在天禽時起手乃推陰陽二遁推九天在震宮則掛東方符懸鏡一面於屋之東上垂綵於東鏡之下推九天在巽宮則掛東南隅符懸鏡一面於東南隅餘六方以例推之中央黃彩卻取天德黃道與月德合日子時正一刻垂於屋之中頂其四方符篆於四七合宿日安之並宜奏吿元君天使證盟潔淨直義凡修大丹先遠淫慾戒殺生行慈善致齋沭潔淨身心方登壇安設祖師神位香燈供儀𥸤禱懇求以祈神明佑助待一陽來復之月一陽生時依法起工甚忌僧尼婦女雞犬穢濁如或有違神明惡之丹道難成每日眞友司察考其功過關防戸牖銅壺晷影司財掌膳典水典火侍香奏白步斗踏罡糾其勤惰動靜不苟和氣從容絕髮折齒歃血結盟立誓於雷將案下共修物外之丹砂同結逍遙之大會他日功成齊登碧落卦氣直義天地變化本於陰陽陽變陰合起於乾坤乾卦用九坤卦用六各有六爻乾爻六九爲策五十有四坤爻六六爲策三十有六合四時而倍之故易曰乾之策二百一十有六坤之策一百四十有四凡三百六十當期之日葢陰陽起伏生成朔望萬物之大數也聖人促年於月促月於日促日於時每一時於二十四炁分得二炁於七十二候分得六候自子至巳是冬至後夏至前自午至亥是夏至後冬至前修煉大藥於十二時辰進退陽火陰符各吐寒暄氣候運入中宮神室互生變化產毓眞精每晝夜二卦直符一年則七百二十卦總計四千三百二十爻應四千三百二十年之氣候是知一辰之内符火進退奪四千三百二十年之正氣歸於神鼎之中大抵火候之數以乾坤坎離四卦爲體餘六十卦爻爲用爻止三百六十一爻爲一星一星凖一銖子行陽火三十六銖二十四銖爲一兩餘十二銖又爲半兩是知子時得陽火一兩半前六時屬陽其數得九陽火則進九兩也總計二百一十六銖其餘少陽少陰五日一候之數不在正例陰符者自午至亥皆屬陰其爻亦減止一百四十四銖其數得六六爲老陰之策午退陰符二十四爻一爻爲一銖二十四銖爲一兩是知六陰時得火亦六兩也總一百四十四銖前六陽時得九後六陰時得六陽九陰六之機於斯盡矣總三百六十爻合神室一斤之體用今九六止一十五兩餘乾坤二卦爲鼎器坎離二卦爲藥物該二十四爻爲一兩之數也凡後學修煉大丹遵明師旨火是藥之父母藥是火之子孫口口相傳心心相授惟專於火遜曰神室一斤火數亦一斤二物不可偏廢今火止十五兩者又何爲哉元君曰鼎中修煉火符之進退按天上月華之盈虧故一日有十二時一年有十二月一時卽一月以上七日半爲春中七日半爲夏爲發生之氣其後中七日半爲秋下七日半爲冬爲殺伐之氣故火止十五兩以按月華光滿之正數若加一兩則太陰過宮以臨陰鄕喪魄之位傳藥不傳火火候眞機盡於九六之數子于宴處其致思焉沐浴直義夫煉丹之法足以周𡻕止有十月丹成者何也葢因二八之月各有停息二月屬兔陽氣方盛陰氣初萌榆莢始落之候止卯木之火而益水安金也八月屬雞陰氣方盛陽氣初萌薺麥漸生之候止酉金之水而增火安胎也修煉大丹必用乎火火準卦爻斯定其數不然則失其多寡之目火雖有十五兩之進至百日方透金鼎之中微微有形孕生金液外煉一鼎過百日後開看金液如何或如燈花雲朶五象俱足吿明上帝高眞取服一丸服之百日聚精累氣接命延年仍封温養至周天數足十月功完無質生質結成黍米玄珠方爲靈藥一鼎靈汞服之則永固形骸也諸友愈加精勤直至三年神丹九年白雪十二神符瓦礫成金枯骨成人形神俱妙萬德周全花開菓熟游賞太淸汝宜珍重三卷瑯文言窮意盡吾返玉京
