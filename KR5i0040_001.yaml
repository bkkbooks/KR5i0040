body:
  text: 銅符鐵券銅符鐵劵題辭考之列仙傳曲阜蘭公精修孝行感斗中真人自稱孝悌王下降其家付以金丹寶經銅符鐵劵令轉授丹陽黃堂諶姆傳之真君許祖今觀其書列為三元藥物火候一一得備似為寶經於符劵無與余博集符篆靈文隨手成帙欲加釐正而是書傳久未可妄以已意紊亂仙經書仍符劵舊名而符篆靈文次為別録以備參考丹經種種止於言理未若是書直指真訣略不少諱者心解之士苟得其訣神丹可立就矣夫訣豈易言哉求訣於心得者十九求訣於口得者十五求訣於紙得無一者余集是書誠索訣於紙然他日有因此而獲魚兔者未必非此為之筌蹄也己亥仲夏一壑居士題
